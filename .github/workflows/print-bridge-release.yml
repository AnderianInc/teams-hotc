name: Build Print Bridge Binaries

on:
  push:
    tags:
      - 'print-bridge-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: print-bridge
        run: npm install

      - name: Install pkg
        run: npm install -g pkg@5

      - name: Build binaries (Windows, macOS Intel + Apple Silicon, Linux)
        working-directory: print-bridge
        run: |
          mkdir -p dist
          pkg . --targets node18-win-x64 --output dist/hotc-print-bridge-win.exe
          pkg . --targets node18-macos-x64 --output dist/hotc-print-bridge-macos-intel-bin
          pkg . --targets node18-macos-arm64 --output dist/hotc-print-bridge-macos-arm64-bin
          pkg . --targets node18-linux-x64 --output dist/hotc-print-bridge-linux

      - name: Inspect build output
        working-directory: print-bridge/dist
        run: ls -la

      # macOS binaries MUST be zipped. GitHub's raw download strips the
      # executable bit AND macOS Gatekeeper quarantines unsigned bare
      # binaries — the user sees "gibberish" opening in TextEdit.
      # Zipping preserves +x and lets us include a helper script.
      - name: Package macOS builds as zip
        working-directory: print-bridge/dist
        run: |
          chmod +x hotc-print-bridge-macos-intel-bin hotc-print-bridge-macos-arm64-bin hotc-print-bridge-linux

          # Intel
          mkdir -p pkg-macos-intel
          cp hotc-print-bridge-macos-intel-bin pkg-macos-intel/hotc-print-bridge
          cat > pkg-macos-intel/run.command <<'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          xattr -dr com.apple.quarantine ./hotc-print-bridge 2>/dev/null || true
          chmod +x ./hotc-print-bridge
          ./hotc-print-bridge
          EOF
          chmod +x pkg-macos-intel/run.command
          (cd pkg-macos-intel && zip -r ../hotc-print-bridge-macos-intel.zip .)

          # Apple Silicon (M1/M2/M3)
          mkdir -p pkg-macos-arm64
          cp hotc-print-bridge-macos-arm64-bin pkg-macos-arm64/hotc-print-bridge
          cat > pkg-macos-arm64/run.command <<'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          xattr -dr com.apple.quarantine ./hotc-print-bridge 2>/dev/null || true
          chmod +x ./hotc-print-bridge
          ./hotc-print-bridge
          EOF
          chmod +x pkg-macos-arm64/run.command
          (cd pkg-macos-arm64 && zip -r ../hotc-print-bridge-macos-arm64.zip .)

          # Linux — also zip to keep +x
          chmod +x hotc-print-bridge-linux
          zip hotc-print-bridge-linux.zip hotc-print-bridge-linux

          # Clean raw macOS binaries so users don't grab the broken ones
          rm -f hotc-print-bridge-macos-intel-bin hotc-print-bridge-macos-arm64-bin
          rm -rf pkg-macos-intel pkg-macos-arm64
          ls -la

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: print-bridge-binaries
          path: print-bridge/dist/*

      # Mirror the same artifacts into Lovable Cloud so end users can download
      # them directly from the app (Children's Ministry → Setup & Guide) without
      # visiting GitHub. Requires two repo secrets:
      #   BRIDGE_UPLOAD_URL   = https://<project-ref>.supabase.co/functions/v1/upload-bridge-release
      #   BRIDGE_UPLOAD_TOKEN = same value stored as BRIDGE_UPLOAD_TOKEN in Lovable Cloud secrets
      - name: Mirror release to Lovable Cloud
        if: startsWith(github.ref, 'refs/tags/print-bridge-v')
        working-directory: print-bridge/dist
        env:
          BRIDGE_UPLOAD_URL: ${{ secrets.BRIDGE_UPLOAD_URL }}
          BRIDGE_UPLOAD_TOKEN: ${{ secrets.BRIDGE_UPLOAD_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          if [ -z "$BRIDGE_UPLOAD_URL" ] || [ -z "$BRIDGE_UPLOAD_TOKEN" ]; then
            echo "BRIDGE_UPLOAD_URL / BRIDGE_UPLOAD_TOKEN not set — skipping Cloud mirror."
            exit 0
          fi
          upload() {
            local file="$1"
            local ctype="$2"
            echo "Uploading $file..."
            curl -sSf -X POST \
              -H "x-upload-token: $BRIDGE_UPLOAD_TOKEN" \
              -H "content-type: $ctype" \
              --data-binary "@$file" \
              "$BRIDGE_UPLOAD_URL?filename=$file"
            echo ""
          }
            local file="$1"
            local ctype="$2"
            echo "Uploading $file..."
            curl -sSf -X POST \
              -H "x-upload-token: $BRIDGE_UPLOAD_TOKEN" \
              -H "content-type: $ctype" \
              --data-binary "@$file" \
              "$BRIDGE_UPLOAD_URL?filename=$file"
            echo ""
          }
          upload "hotc-print-bridge-win.exe"          "application/octet-stream"
          upload "hotc-print-bridge-macos-arm64.zip"  "application/zip"
          upload "hotc-print-bridge-macos-intel.zip"  "application/zip"
          upload "hotc-print-bridge-linux.zip"        "application/zip"

          # Write manifest
          cat > version.json <<EOF
          { "tag": "$TAG", "released_at": "$(date -u +%FT%TZ)", "notes_url": "https://github.com/${{ github.repository }}/releases/tag/$TAG" }
          EOF
          curl -sSf -X POST \
            -H "x-upload-token: $BRIDGE_UPLOAD_TOKEN" \
            -H "content-type: application/json" \
            --data-binary "@version.json" \
            "$BRIDGE_UPLOAD_URL?manifest=1"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/print-bridge-v')
        uses: softprops/action-gh-release@v2
        with:
          files: print-bridge/dist/*
          generate_release_notes: true
          body: |
            ## HOTC Print Bridge

            Standalone binaries for the HOTC Volunteer Hub print bridge.

            - **Windows**: `hotc-print-bridge-win.exe` — double-click to run.
            - **macOS Apple Silicon (M1/M2/M3)**: `hotc-print-bridge-macos-arm64.zip` — unzip, then double-click `run.command`.
            - **macOS Intel**: `hotc-print-bridge-macos-intel.zip` — unzip, then double-click `run.command`.
            - **Linux**: `hotc-print-bridge-linux.zip` — unzip, `chmod +x hotc-print-bridge-linux`, run.

            > macOS note: the app is unsigned. First launch will warn "cannot verify developer" — right-click `run.command` → **Open** → **Open** to approve once. After that it launches normally.

            See [print-bridge/README.md](../blob/main/print-bridge/README.md) for full setup.
